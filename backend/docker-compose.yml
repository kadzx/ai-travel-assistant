version: '3.8'

services:
  app:
    build: .
    container_name: ai_travel_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_HOST=mysql_db
      - DB_USER=root
      - DB_PASS=X@20031018x
      - DB_NAME=travel_assistant_db
      - NODE_ENV=development
    depends_on:
      - mysql_db
    networks:
      - app_network
    volumes:
      - ./logs:/app/logs

  mysql_db:
    image: mysql:8.0
    container_name: ai_travel_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: X@20031018x
      MYSQL_DATABASE: travel_assistant_db
    ports:
      - "3306:3306"
    volumes:
      - ./mysql-data:/var/lib/mysql
    networks:
      - app_network
    command: --default-authentication-plugin=mysql_native_password

networks:
  app_network:
    driver: bridge
